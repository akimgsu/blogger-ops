name: Publish Post to Blogger

on:
  push:
    branches:
      - main
    paths:
      - 'posts/en/**/*.html'
  workflow_dispatch:
    inputs:
      publish_all:
        description: 'Publish all files (ignore changed-files check)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags to support changed files detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm init -y
          npm install googleapis

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: posts/en/**/*.html

      - name: Publish posts
        if: steps.changed-files.outputs.any_changed == 'true' || github.event.inputs.publish_all == 'true'
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: |
          if [ "${{ github.event.inputs.publish_all }}" == "true" ]; then
            FILES=$(find posts/en -name "*.html")
          else
            FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          fi
          
          for file in $FILES; do
            echo "Publishing: $file"
            node scripts/publish.js "$file"
            echo "Waiting 30 seconds to avoid Google API rate limits..."
            sleep 30
          done
